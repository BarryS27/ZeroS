name: Auto Build CSS from UI Package

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ZeroS code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Compile SCSS to CSS
        run: npx sass --load-path=node_modules styles.scss styles.css

      - name: Commit and Push if CSS changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add styles.css
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-compile css from @barrys27/ui" && git push)
