<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ZeroS</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="barrys27-ui.css">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
    
        <header>
            <h1 id="greeting">Welcome back, Barry</h1>
            <div id="weather">
                <span id="weather-emoji"></span>
                <span id="temp">--°</span>
            </div>
        </header>
    
        <main>
            <textarea id="notes" placeholder="Start typing..." spellcheck="false"></textarea>
        </main>
    
        <nav aria-label="Quick Links">
            <ul>
                <li><a href="https://github.com"><img src="https://www.google.com/s2/favicons?sz=64&domain=github.com" alt="GitHub" onerror="this.style.opacity='0'"></a></li>
                <li><a href="https://reddit.com"><img src="https://www.google.com/s2/favicons?sz=64&domain=reddit.com" alt="Reddit" onerror="this.style.opacity='0'"></a></li>
                <li><a href="https://youtube.com"><img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com" alt="YouTube" onerror="this.style.opacity='0'"></a></li>
            </ul>
        </nav>
    
        <footer>
            <small>© 2026 Bairu Song</small>
        </footer>
    
        <script src="script.js"></script>
    </body>
</html>
